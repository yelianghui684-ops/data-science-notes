<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data Science Second Brain · Knowledge Graph</title>
<style>
  html, body { margin: 0; height: 100%; background: #05060f; overflow: hidden;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  #graph { width: 100%; height: 100%; }
  #panel {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    background: rgba(10, 14, 30, .72); backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 140, 255, .25); border-radius: 12px;
    padding: 14px 16px; color: #cdd6ff; max-width: 250px;
  }
  #panel h1 { font-size: 15px; margin: 0 0 6px; color: #fff; }
  #panel p { font-size: 12px; margin: 4px 0; line-height: 1.5; color: #9aa6d8; }
  #legend { margin-top: 8px; font-size: 12px; }
  .lg { display: flex; align-items: center; gap: 6px; margin: 3px 0; cursor: pointer; opacity: .85; }
  .lg:hover, .lg.on { opacity: 1; }
  .lg.on { font-weight: 600; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  #search {
    width: 100%; box-sizing: border-box; margin-top: 10px;
    background: rgba(255,255,255,.08); border: 1px solid rgba(120,140,255,.3);
    border-radius: 8px; padding: 6px 10px; color: #fff; font-size: 13px; outline: none;
  }
  #tip { position: absolute; bottom: 14px; left: 16px; z-index: 10;
    color: #5f6b9e; font-size: 11px; }
</style>
</head>
<body>
<div id="graph"></div>
<div id="panel">
  <h1>✨ Data Science Second Brain</h1>
  <p id="stats"></p>
  <input id="search" placeholder="🔍 Search notes…" />
  <div id="legend"></div>
</div>
<div id="tip">Drag to pan · Scroll to zoom · Click to focus · Double-click to open in Obsidian</div>

<script src="graph-data.js"></script>
<script src="https://cdn.jsdelivr.net/npm/force-graph@1"></script>
<script>
const VAULT_NAME = 'data-science-notes';
const PALETTE = {
  '00-Home':               '#ffd94a',
  '01-Mathematics':        '#7c9cff',
  '02-Statistics':         '#4ecdc4',
  '03-Programming-Tools':  '#95e06c',
  '04-Databases-SQL':      '#f7a072',
  '05-Machine-Learning':   '#ff6b9d',
  '06-Deep-Learning':      '#c084fc',
  '07-Data-Visualization': '#38bdf8',
  '08-Data-Engineering':   '#fb7185',
  '09-Projects':           '#facc15',
  'Templates':             '#8b93a8',
  '根目录':                '#5f6b7a',
};
const color = n => PALETTE[n.group] || '#8b93a8';
const radius = n => n.isHub ? (n.group === '00-Home' ? 14 : 9) : 3.5 + Math.min(n.degree, 8) * 0.5;

document.getElementById('stats').textContent =
  `${graphData.nodes.length} notes · ${graphData.links.length} links`;

// 图例(点击筛选领域)
let activeGroup = null, query = '';
const legend = document.getElementById('legend');
Object.entries(PALETTE).forEach(([g, c]) => {
  if (g === 'Templates' || g === '根目录') return;
  const row = document.createElement('div');
  row.className = 'lg';
  row.innerHTML = `<span class="dot" style="background:${c}"></span>${g.replace(/^\d+-/, '')}`;
  row.onclick = () => {
    activeGroup = activeGroup === g ? null : g;
    [...legend.children].forEach(el => el.classList.remove('on'));
    if (activeGroup) row.classList.add('on');
    Graph.nodeVisibility(Graph.nodeVisibility());
  };
  legend.appendChild(row);
});
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.trim().toLowerCase();
  Graph.nodeVisibility(Graph.nodeVisibility());
});
function visible(n) {
  if (query) return n.id.toLowerCase().includes(query);
  if (activeGroup) return n.group === activeGroup || n.group === '00-Home';
  return true;
}

// 背景星空(屏幕坐标,固定不动)
const stars = Array.from({ length: 220 }, () => ({
  x: Math.random(), y: Math.random(),
  r: Math.random() * 1.1 + 0.3, a: Math.random() * 0.5 + 0.15,
}));

const elem = document.getElementById('graph');
const Graph = ForceGraph()(elem)
  .graphData(graphData)
  .backgroundColor('#05060f')
  .nodeVisibility(n => visible(n))
  .linkVisibility(l => visible(l.source) && visible(l.target))
  .nodeLabel(n => `<div style="background:rgba(10,14,30,.92);padding:6px 10px;border-radius:8px;
      color:#fff;font-size:13px;border:1px solid ${color(n)}66">${n.id}<br>
      <span style="color:#9aa6d8;font-size:11px">${n.group} · ${n.degree} links</span></div>`)
  .linkColor(() => 'rgba(124,156,255,0.22)')
  .linkWidth(0.6)
  .nodeCanvasObject((n, ctx, scale) => {
    if (!isFinite(n.x) || !isFinite(n.y)) return;
    const r = radius(n), c = color(n);
    // 光晕
    const grad = ctx.createRadialGradient(n.x, n.y, r * 0.4, n.x, n.y, r * 3);
    grad.addColorStop(0, c + '55');
    grad.addColorStop(1, c + '00');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(n.x, n.y, r * 3, 0, 2 * Math.PI); ctx.fill();
    // 核心
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 2 * Math.PI); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    ctx.beginPath(); ctx.arc(n.x, n.y, r * 0.35, 0, 2 * Math.PI); ctx.fill();
    // 标签:枢纽常显,其余放大后显示
    if (n.isHub || scale > 2.2) {
      const label = n.id.replace(' MOC', '').replace('🌌 ', '');
      const fs = n.isHub ? Math.max(13 / scale, 3.5) : 11 / scale;
      ctx.font = `${n.isHub ? '600 ' : ''}${fs}px -apple-system, "PingFang SC", sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = n.isHub ? '#ffffff' : 'rgba(205,214,255,.75)';
      ctx.fillText(label, n.x, n.y + r * 3 * 0.55);
    }
  })
  .nodePointerAreaPaint((n, paintColor, ctx) => {
    ctx.fillStyle = paintColor;
    ctx.beginPath(); ctx.arc(n.x, n.y, radius(n) + 4, 0, 2 * Math.PI); ctx.fill();
  })
  .onRenderFramePre(ctx => {
    ctx.save();
    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
    const w = elem.clientWidth, h = elem.clientHeight;
    for (const s of stars) {
      ctx.fillStyle = `rgba(160,180,230,${s.a})`;
      ctx.beginPath(); ctx.arc(s.x * w, s.y * h, s.r, 0, 2 * Math.PI); ctx.fill();
    }
    ctx.restore();
  })
  .onNodeRightClick(n => openInObsidian(n));

// 单击聚焦,双击在 Obsidian 中打开
let lastClick = { id: null, t: 0 };
Graph.onNodeClick(n => {
  const now = Date.now();
  if (lastClick.id === n.id && now - lastClick.t < 400) openInObsidian(n);
  else { Graph.centerAt(n.x, n.y, 600); Graph.zoom(3.2, 600); }
  lastClick = { id: n.id, t: now };
});

function openInObsidian(n) {
  window.location.href = `obsidian://open?vault=${encodeURIComponent(VAULT_NAME)}&file=${encodeURIComponent(n.path.replace(/\.md$/, ''))}`;
}

// 星状布局:枢纽间斥力更大
Graph.d3Force('charge').strength(n => (n.isHub ? -320 : -45));
let fitted = false;
Graph.onEngineStop(() => { if (!fitted) { fitted = true; Graph.zoomToFit(500, 70); } });
</script>
</body>
</html>

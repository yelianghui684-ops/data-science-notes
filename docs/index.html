<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data Science Second Brain · 知识星云</title>
<link rel="stylesheet" href="style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "d3-force": "https://esm.sh/d3-force@3"
  }
}
</script>
</head>
<body data-lod="mid">

<div id="stage"></div>
<div id="vignette"></div>

<!-- 左侧:标题 / 搜索 / 图例 -->
<aside id="panel" class="glass">
  <h1>✦ 知识星云 <span>Second Brain</span></h1>
  <p id="stats"></p>
  <div id="searchWrap">
    <input id="search" placeholder="搜索星体…" autocomplete="off" spellcheck="false" />
    <div id="results" class="glass"></div>
  </div>
  <div id="legend"></div>
</aside>

<!-- 右上:工具栏 -->
<nav id="toolbar" class="glass">
  <a class="btn" id="tbObsidian" href="#">⬡ Obsidian 库</a>
  <a class="btn" href="https://github.com/yelianghui684-ops/data-science-notes" target="_blank">⬡ GitHub</a>
</nav>

<!-- 右侧:详情抽屉 -->
<aside id="drawer" class="glass">
  <span id="drawerClose">✕</span>
  <div id="drawerChip"></div>
  <h2 id="drawerTitle"></h2>
  <p id="drawerMeta"></p>
  <p id="drawerExcerpt"></p>
  <h3>相连星体</h3>
  <div id="drawerLinks"></div>
  <div id="drawerActions">
    <a class="btn" id="actObsidian" href="#">📝 在 Obsidian 中编辑</a>
    <a class="btn" id="actEdit" href="#" target="_blank">✏️ 在 GitHub 上编辑</a>
    <a class="btn" id="actView" href="#" target="_blank">👁 在 GitHub 上查看</a>
  </div>
</aside>

<!-- 右下:小地图 -->
<canvas id="minimap" class="glass" width="170" height="120"></canvas>

<!-- 底部:航线面包屑 -->
<div id="trail" class="glass"><span id="trailClear" title="清除航线">✕</span><div id="trailChips"></div></div>

<div id="tip">拖动平移 · 滚轮缩放 · 悬停聚焦 · 单击查看 · 双击打开 Obsidian</div>

<div id="fallback" class="glass">
  <h2>⚠️ 无法初始化 WebGL</h2>
  <p>你的浏览器或设备暂不支持 WebGL 渲染。可以直接使用:</p>
  <a class="btn" href="obsidian://open?vault=data-science-notes">打开 Obsidian 库</a>
  <a class="btn" href="https://github.com/yelianghui684-ops/data-science-notes">GitHub 仓库</a>
</div>

<script src="graph-data.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
